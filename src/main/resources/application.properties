# Render Database Settings (PostgreSQL)
# පල්ලෙහා URL එකට Render එකෙන් ලැබුණු External Database URL එක පේස්ට් කරන්න
spring.datasource.url=jdbc:postgresql://<ඔයාගේ_external_url_මෙතනට_දාන්න>
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Port (Render uses 8080 by default)
server.port=8080

# JSP View Resolver (Circular view path error එක මෙතනින් හැදෙනවා)
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# File Upload Limit (Images වලට අවශ්‍ය නිසා)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB